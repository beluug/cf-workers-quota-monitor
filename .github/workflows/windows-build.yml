name: Windows release build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install .NET 6 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "6.0.x"

      - name: Install NSIS
        shell: powershell
        run: choco install nsis --yes --no-progress

      - name: Build x64 and ARM64 packages
        shell: powershell
        run: .\build-windows.ps1 -Architecture all

      - name: Upload unsigned release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cf-quota-monitor-windows-unsigned
          path: |
            release/*Windows*x64*
            release/*Windows*arm64*
            release/SHA256SUMS-Windows.txt
          if-no-files-found: error
